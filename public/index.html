<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SauDInoB | Monitorização Respiratória</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navegação principal">
      <div class="brand">
        <span class="brand-mark">S</span>
        <div>
          <strong>SauDInoB</strong>
          <span>Controlo Respiratório</span>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <h1 id="view-title">Dashboard do Utente</h1>
        </div>
        <div class="session-card" id="session-card">
          <span class="status-dot"></span>
          <div>
            <strong>A carregar...</strong>
            <span>Sessão de demonstração</span>
          </div>
        </div>
      </header>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
      <section id="app" class="view-stage" aria-live="polite"></section>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
