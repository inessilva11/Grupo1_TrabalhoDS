<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SauDInoB | Monitorizacao Respiratoria</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navegacao principal">
      <div class="brand">
        <span class="brand-mark">S</span>
        <div>
          <strong>SauDInoB</strong>
          <span>Respiratorio</span>
        </div>
      </div>

      <nav class="role-switcher" aria-label="Perfis de demonstracao">
        <button class="role-button active" type="button" data-login-role="utente">
          <span>Utente</span>
          <small>Questionario e historico</small>
        </button>
        <button class="role-button" type="button" data-login-role="medico">
          <span>Medico</span>
          <small>Triagem e alertas</small>
        </button>
        <button class="role-button" type="button" data-login-role="administrador">
          <span>Admin</span>
          <small>Configuracao e dados</small>
        </button>
      </nav>

      <div class="sidebar-note">
        <strong>MVC + Service</strong>
        <span>Node, JSON, HTML, CSS e JavaScript.</span>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Aplicacao funcional baseada no relatorio do Grupo 1</p>
          <h1 id="view-title">Dashboard do Utente</h1>
        </div>
        <div class="session-card" id="session-card">
          <span class="status-dot"></span>
          <div>
            <strong>A carregar...</strong>
            <span>Sessao de demonstracao</span>
          </div>
        </div>
      </header>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
      <section id="app" class="view-stage" aria-live="polite"></section>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
